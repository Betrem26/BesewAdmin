name: Protect Main Branch

on:
  push:
    branches:
      - main

jobs:
  prevent-direct-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check for direct push to main
        run: |
          # Get the commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          # Check if this is a merge commit (from PR)
          if git log -1 --pretty=%P | grep -q " "; then
            echo "✅ This is a merge commit from a pull request - allowed"
            exit 0
          fi
          
          # If not a merge commit and pushed to main, reject
          echo "❌ ERROR: Direct pushes to main branch are not allowed!"
          echo ""
          echo "Please use the following workflow:"
          echo "1. Create a feature branch: git checkout -b feature/your-feature"
          echo "2. Make your changes and commit"
          echo "3. Push to GitHub: git push origin feature/your-feature"
          echo "4. Create a Pull Request on GitHub"
          echo "5. Request approval and merge through the PR"
          echo ""
          echo "This ensures code review before production deployment."
          exit 1
