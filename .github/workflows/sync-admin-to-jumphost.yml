name: Build and Deploy Admin Dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  JUMPHOST_IP: "197.156.110.145"
  JUMPHOST_PORT: "250"
  JUMPHOST_USER: "startupadmin"
  JUMPHOST_PASSWORD: "Admin@2025"
  DEPLOYMENT_PATH: "/mnt/data/besew/frontend/admin"
  SERVICE_NAME: "besew-admin-dashboard"
  CONTAINER_PORT: "3000"
  DOMAIN: "admin.besewonline.com"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create archive
      run: |
        echo "Creating archive of admin dashboard source code..."
        tar --exclude='node_modules' --exclude='.git' --exclude='*.log' --exclude='dist' --exclude='.next' --exclude='out' --exclude='*.tar.gz' -czf ../admin-dashboard.tar.gz .
        mv ../admin-dashboard.tar.gz .
        ls -lh admin-dashboard.tar.gz

    - name: Install SSH tools
      run: sudo apt-get update && sudo apt-get install -y sshpass

    - name: Transfer to jumphost
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" scp -P ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no admin-dashboard.tar.gz ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }}:~/

    - name: Extract and setup on jumphost
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Setting up admin dashboard on jumphost...'
          
          # Create deployment directory
          echo 'Admin@2025' | sudo -S mkdir -p ${{ env.DEPLOYMENT_PATH }}
          echo 'Admin@2025' | sudo -S chown startupadmin:startupadmin ${{ env.DEPLOYMENT_PATH }}
          
          # Backup existing deployment
          if [ -d '${{ env.DEPLOYMENT_PATH }}' ] && [ -n \"\$(ls -A ${{ env.DEPLOYMENT_PATH }})\" ]; then
            echo 'Creating backup of current deployment...'
            tar -czf ~/admin-dashboard.backup.\$(date +%Y%m%d_%H%M%S).tar.gz -C ${{ env.DEPLOYMENT_PATH }} .
          fi
          
          # Clean deployment directory completely to remove old files
          echo 'Cleaning deployment directory...'
          rm -rf ${{ env.DEPLOYMENT_PATH }}/*
          rm -rf ${{ env.DEPLOYMENT_PATH }}/.[!.]*
          
          # Extract new code
          cd ${{ env.DEPLOYMENT_PATH }}
          tar -xzf ~/admin-dashboard.tar.gz
          rm ~/admin-dashboard.tar.gz
          
          echo 'Admin dashboard source code synced to ${{ env.DEPLOYMENT_PATH }}'
        "

    - name: Build Docker image on jumphost
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo '========== BUILD PHASE START =========='
          echo 'Building Docker image on jumphost (includes npm install and build)...'
          cd ${{ env.DEPLOYMENT_PATH }}
          
          # Clean up build artifacts and caches
          echo '[STEP 1] Cleaning up old build artifacts...'
          echo 'Admin@2025' | sudo -S rm -rf dist node_modules
          
          # Clean Docker builder cache
          echo '[STEP 2] Cleaning Docker builder cache...'
          echo 'Admin@2025' | sudo -S docker builder prune -af
          
          # Remove existing images
          echo '[STEP 3] Removing existing images...'
          docker rmi ${{ env.SERVICE_NAME }}:latest 2>/dev/null || true
          
          # Docker multi-stage build handles npm install and build internally
          echo '[STEP 4] Starting Docker build (this may take several minutes)...'
          echo 'Admin@2025' | sudo -S docker build --no-cache -t ${{ env.SERVICE_NAME }}:latest .
          BUILD_EXIT_CODE=\$?
          
          if [ \$BUILD_EXIT_CODE -eq 0 ]; then
            echo '[SUCCESS] Docker image built successfully'
            echo 'Admin@2025' | sudo -S docker tag ${{ env.SERVICE_NAME }}:latest ${{ env.SERVICE_NAME }}:\$(date +%Y%m%d-%H%M%S)
            echo '[INFO] Tagging image with timestamp'
            echo 'Admin@2025' | sudo -S docker images | grep ${{ env.SERVICE_NAME }}
          else
            echo '[ERROR] Docker build failed with exit code: '\$BUILD_EXIT_CODE
            exit 1
          fi
          echo '========== BUILD PHASE END =========='
        "

    - name: Deploy container
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo '========== DEPLOY PHASE START =========='
          echo '[STEP 1] Checking if image exists locally...'
          echo 'Admin@2025' | sudo -S docker images | grep ${{ env.SERVICE_NAME }} || echo '[WARNING] Image not found in local registry'
          
          echo '[STEP 2] Stopping and removing old container...'
          echo 'Admin@2025' | sudo -S docker stop ${{ env.SERVICE_NAME }} 2>/dev/null || echo '[INFO] No running container to stop'
          echo 'Admin@2025' | sudo -S docker rm -f ${{ env.SERVICE_NAME }} 2>/dev/null || echo '[INFO] No container to remove'
          
          echo '[STEP 3] Starting new container from local image...'
          CONTAINER_OUTPUT=\$(echo 'Admin@2025' | sudo -S docker run -d \
            --name ${{ env.SERVICE_NAME }} \
            --network backend_besew-network \
            -p 3000:80 \
            --restart unless-stopped \
            ${{ env.SERVICE_NAME }}:latest 2>&1)
          
          CONTAINER_EXIT_CODE=\$?
          if [ \$CONTAINER_EXIT_CODE -eq 0 ]; then
            echo '[SUCCESS] Container started successfully'
            echo '[INFO] Container ID: '\$CONTAINER_OUTPUT
          else
            echo '[ERROR] Failed to start container'
            echo '[ERROR] Output: '\$CONTAINER_OUTPUT
            exit 1
          fi
          echo '========== DEPLOY PHASE END =========='
        "

    - name: Wait for container to be ready
      run: sleep 10

    - name: Verify deployment
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo '========== VERIFY PHASE START =========='
          
          echo '[STEP 1] Checking container status...'
          CONTAINER_STATUS=\$(docker ps --filter name=${{ env.SERVICE_NAME }} --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}')
          echo \"\$CONTAINER_STATUS\"
          
          if [ -z \"\$CONTAINER_STATUS\" ]; then
            echo '[ERROR] Container is not running'
            echo '[INFO] Checking all containers...'
            docker ps -a --filter name=${{ env.SERVICE_NAME }}
            exit 1
          fi
          
          echo '[STEP 2] Checking container logs...'
          docker logs ${{ env.SERVICE_NAME }} --tail 30
          
          echo '[STEP 3] Testing local access on port 80...'
          HTTP_STATUS=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:80)
          echo \"[INFO] HTTP Status: \$HTTP_STATUS\"
          
          if [ \"\$HTTP_STATUS\" = \"200\" ]; then
            echo '[SUCCESS] Service is responding correctly'
          elif [ \"\$HTTP_STATUS\" = \"301\" ] || [ \"\$HTTP_STATUS\" = \"302\" ]; then
            echo '[INFO] Service responding with redirect (expected for some configs)'
          else
            echo '[WARNING] Service returned status '\$HTTP_STATUS' (expected 200 or 3xx)'
          fi
          
          echo '========== VERIFY PHASE END =========='
        "

    - name: Reload NGINX
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Reloading NGINX...'
          echo 'Admin@2025' | sudo -S systemctl reload nginx
          echo 'NGINX reloaded successfully'
        "

    - name: Test production deployment
      run: |
        echo "Testing HTTP..."
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.DOMAIN }})
        echo "HTTP Status: $HTTP_STATUS"
        
        if [ "$HTTP_STATUS" != "200" ]; then
          echo "[WARNING] HTTP not returning 200"
        fi

    - name: Cleanup old Docker images
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Cleaning up old Docker images...'
          
          # Remove old tagged images (keep last 3)
          docker images ${{ env.SERVICE_NAME }} --format '{{.ID}} {{.CreatedAt}}' | sort -rk 2 | tail -n +4 | awk '{print \$1}' | xargs -r docker rmi 2>/dev/null || true
          
          # Remove dangling images only (not referenced by running containers)
          docker image prune -f
          
          # Remove build cache
          docker builder prune -f --filter 'until=24h'
          
          echo 'Cleanup completed'
          docker system df
        "

    - name: Cleanup old backups
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Cleaning up old backups (keeping last 3)...'
          cd ~
          ls -t admin-dashboard.backup.*.tar.gz 2>/dev/null | tail -n +4 | xargs -r rm -f
          echo 'Backup cleanup completed'
        "

    - name: Deployment summary
      if: always()
      run: |
        echo "========================================="
        echo "ADMIN DASHBOARD DEPLOYMENT SUMMARY"
        echo "========================================="
        echo "Service: Admin Dashboard (React + Vite)"
        echo "Domain: http://${{ env.DOMAIN }}"
        echo "Container: ${{ env.SERVICE_NAME }}"
        echo "Port: ${{ env.CONTAINER_PORT }}"
        echo "Build Location: Jumphost (${{ env.DEPLOYMENT_PATH }})"
        echo "Status: ${{ job.status }}"
        echo "========================================="
