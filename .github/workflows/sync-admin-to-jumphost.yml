name: Build and Deploy Admin Dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  JUMPHOST_IP: "197.156.110.145"
  JUMPHOST_PORT: "250"
  JUMPHOST_USER: "startupadmin"
  JUMPHOST_PASSWORD: "Admin@2025"
  DEPLOYMENT_PATH: "/mnt/data/besew/frontend/admin"
  SERVICE_NAME: "besew-admin-dashboard"
  CONTAINER_PORT: "3000"
  DOMAIN: "admin.besewonline.com"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create archive
      run: |
        echo "Creating archive of admin dashboard source code..."
        tar --exclude='node_modules' --exclude='.git' --exclude='*.log' --exclude='dist' --exclude='*.tar.gz' -czf ../admin-dashboard.tar.gz .
        mv ../admin-dashboard.tar.gz .
        ls -lh admin-dashboard.tar.gz

    - name: Install SSH tools
      run: sudo apt-get update && sudo apt-get install -y sshpass

    - name: Save Docker image
      run: |
        echo "Saving Docker image to tar file..."
        docker save ${{ env.SERVICE_NAME }}:latest | gzip > admin-dashboard-image.tar.gz
        ls -lh admin-dashboard-image.tar.gz

    - name: Transfer image and source to jumphost
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" scp -P ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no admin-dashboard-image.tar.gz ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }}:~/
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" scp -P ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no admin-dashboard.tar.gz ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }}:~/

    - name: Load image and deploy on jumphost
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Loading Docker image on jumphost...'
          
          # Load the pre-built image
          echo 'Admin@2025' | sudo -S docker load -i ~/admin-dashboard-image.tar.gz
          rm ~/admin-dashboard-image.tar.gz
          
          echo 'Docker image loaded successfully'
          docker images | grep ${{ env.SERVICE_NAME }}
          
          # Extract source code for reference
          echo 'Extracting source code...'
          echo 'Admin@2025' | sudo -S mkdir -p ${{ env.DEPLOYMENT_PATH }}
          echo 'Admin@2025' | sudo -S chown startupadmin:startupadmin ${{ env.DEPLOYMENT_PATH }}
          
          # Backup existing deployment
          if [ -d '${{ env.DEPLOYMENT_PATH }}' ] && [ -n \"\$(ls -A ${{ env.DEPLOYMENT_PATH }})\" ]; then
            echo 'Creating backup of current deployment...'
            tar -czf ~/admin-dashboard.backup.\$(date +%Y%m%d_%H%M%S).tar.gz -C ${{ env.DEPLOYMENT_PATH }} .
          fi
          
          # Clean deployment directory
          echo 'Cleaning deployment directory...'
          rm -rf ${{ env.DEPLOYMENT_PATH }}/*
          rm -rf ${{ env.DEPLOYMENT_PATH }}/.[!.]*
          
          # Extract new code
          cd ${{ env.DEPLOYMENT_PATH }}
          tar -xzf ~/admin-dashboard.tar.gz
          rm ~/admin-dashboard.tar.gz
          
          echo 'Admin dashboard source code synced to ${{ env.DEPLOYMENT_PATH }}'
        "

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Build locally
      run: |
        echo "Building admin dashboard locally..."
        npm ci
        npm run build
        echo "Build completed successfully"

    - name: Build Docker image locally
      run: |
        echo "Building Docker image locally..."
        docker build --no-cache -f Dockerfile.production -t ${{ env.SERVICE_NAME }}:latest .
        docker tag ${{ env.SERVICE_NAME }}:latest ${{ env.SERVICE_NAME }}:$(date +%Y%m%d-%H%M%S)
        echo "Docker image built successfully"
        docker images | grep ${{ env.SERVICE_NAME }}

    - name: Deploy container
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Deploying admin dashboard container...'
          
          # Stop and remove old container
          echo 'Admin@2025' | sudo -S docker stop ${{ env.SERVICE_NAME }} 2>/dev/null || true
          echo 'Admin@2025' | sudo -S docker rm -f ${{ env.SERVICE_NAME }} 2>/dev/null || true
          
          # Start new container
          echo 'Admin@2025' | sudo -S docker run -d \
            --name ${{ env.SERVICE_NAME }} \
            --network backend_besew-network \
            -p 3001:3000 \
            --restart unless-stopped \
            ${{ env.SERVICE_NAME }}:latest
          
          echo 'Container started successfully'
        "

    - name: Wait for container to be ready
      run: sleep 10

    - name: Verify deployment
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Verifying deployment...'
          
          # Check if image exists
          if ! docker image inspect ${{ env.SERVICE_NAME }}:latest > /dev/null 2>&1; then
            echo '[ERROR] Docker image not found: ${{ env.SERVICE_NAME }}:latest'
            echo 'Available images:'
            docker images | grep -E 'besew|admin|REPOSITORY' || echo 'No matching images found'
            exit 1
          fi
          
          # Check container status
          if docker ps --filter name=${{ env.SERVICE_NAME }} --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -q ${{ env.SERVICE_NAME }}; then
            echo '[SUCCESS] Container is running'
            docker ps --filter name=${{ env.SERVICE_NAME }} --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          else
            echo '[WARNING] Container not running, checking if it exists...'
            if docker ps -a --filter name=${{ env.SERVICE_NAME }} --format 'table {{.Names}}\t{{.Status}}' | grep -q ${{ env.SERVICE_NAME }}; then
              echo 'Container exists but is not running. Logs:'
              docker logs ${{ env.SERVICE_NAME }} --tail 20
            else
              echo '[ERROR] Container does not exist'
              exit 1
            fi
          fi
          
          # Test local access
          echo 'Testing local access on port ${{ env.CONTAINER_PORT }}...'
          HTTP_STATUS=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:${{ env.CONTAINER_PORT }} 2>&1)
          echo \"HTTP Status: \$HTTP_STATUS\"
          
          if [ \"\$HTTP_STATUS\" = \"200\" ] || [ \"\$HTTP_STATUS\" = \"301\" ] || [ \"\$HTTP_STATUS\" = \"302\" ]; then
            echo '[SUCCESS] Service is responding'
          else
            echo '[WARNING] Service returned status \$HTTP_STATUS (may still be starting up)'
          fi
        "

    - name: Reload NGINX
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Reloading NGINX...'
          echo 'Admin@2025' | sudo -S systemctl reload nginx
          echo 'NGINX reloaded successfully'
        "

    - name: Test production deployment
      run: |
        echo "Testing HTTP..."
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.DOMAIN }})
        echo "HTTP Status: $HTTP_STATUS"
        
        if [ "$HTTP_STATUS" != "200" ]; then
          echo "[WARNING] HTTP not returning 200"
        fi

    - name: Cleanup old Docker images
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Cleaning up old Docker images...'
          
          # Remove old tagged images (keep last 3)
          docker images ${{ env.SERVICE_NAME }} --format '{{.ID}} {{.CreatedAt}}' | sort -rk 2 | tail -n +4 | awk '{print \$1}' | xargs -r docker rmi 2>/dev/null || true
          
          # Remove dangling images only (not referenced by running containers)
          docker image prune -f
          
          # Remove build cache
          docker builder prune -f --filter 'until=24h'
          
          echo 'Cleanup completed'
          docker system df
        "

    - name: Cleanup old backups
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Cleaning up old backups (keeping last 3)...'
          cd ~
          ls -t admin-dashboard.backup.*.tar.gz 2>/dev/null | tail -n +4 | xargs -r rm -f
          echo 'Backup cleanup completed'
        "

    - name: Deployment summary
      if: always()
      run: |
        echo "========================================="
        echo "ADMIN DASHBOARD DEPLOYMENT SUMMARY"
        echo "========================================="
        echo "Service: Admin Dashboard (React + Vite)"
        echo "Domain: http://${{ env.DOMAIN }}"
        echo "Container: ${{ env.SERVICE_NAME }}"
        echo "Port: ${{ env.CONTAINER_PORT }}"
        echo "Build Location: Jumphost (${{ env.DEPLOYMENT_PATH }})"
        echo "Status: ${{ job.status }}"
        echo "========================================="
