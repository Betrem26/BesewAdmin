name: Deploy Admin Dashboard to Production

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      bypass_staging_gate:
        description: "Emergency only: bypass staging-success gate"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      bypass_token:
        description: "Required only when bypass_staging_gate=true (matches PROD_BYPASS_TOKEN secret)"
        required: false
        type: string

env:
  JUMPHOST_IP: "197.156.110.145"
  JUMPHOST_PORT: "250"
  JUMPHOST_USER: "startupadmin"
  JUMPHOST_PASSWORD: "Admin@2025"
  DEPLOYMENT_PATH: "/mnt/data/besew/frontend/admin"
  SERVICE_NAME: "besew-admin-dashboard"
  CONTAINER_PORT: "6134"
  DOMAIN: "admin.besewonline.com"

permissions:
  actions: read
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    concurrency:
      group: admin-dashboard-production
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --prefer-offline

      - name: Rebuild native modules
        run: |
          npm rebuild
          npm install @rollup/rollup-linux-x64-gnu --save-optional

      - name: Build React application (Vite)
        run: npm run build

      - name: Create deployment package
        run: |
          tar --exclude='node_modules' --exclude='.git' --exclude='*.log' --exclude='.next' --exclude='out' --exclude='*.tar.gz' -czf /tmp/admin-dashboard-prod.tar.gz .
          mv /tmp/admin-dashboard-prod.tar.gz ./admin-dashboard-prod.tar.gz
          ls -lh admin-dashboard-prod.tar.gz

      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Transfer to jumphost
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" scp -P ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no -o ServerAliveInterval=60 \
            admin-dashboard-prod.tar.gz \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }}:~/

      - name: Extract and setup on server
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
              echo 'Admin@2025' | sudo -S mkdir -p ${{ env.DEPLOYMENT_PATH }}
              echo 'Admin@2025' | sudo -S chown startupadmin:startupadmin ${{ env.DEPLOYMENT_PATH }}
              if [ -d '${{ env.DEPLOYMENT_PATH }}' ] && [ -n \"\$(ls -A ${{ env.DEPLOYMENT_PATH }})\" ]; then
                tar -czf ~/admin-dashboard.backup.\$(date +%Y%m%d_%H%M%S).tar.gz -C ${{ env.DEPLOYMENT_PATH }} .
              fi
              rm -rf ${{ env.DEPLOYMENT_PATH }}/*
              cd ${{ env.DEPLOYMENT_PATH }}
              tar -xzf ~/admin-dashboard-prod.tar.gz
              rm ~/admin-dashboard-prod.tar.gz
            "

      - name: Build Docker image
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
              cd ${{ env.DEPLOYMENT_PATH }}
              echo 'Admin@2025' | sudo -S docker builder prune -af
              echo 'Admin@2025' | sudo -S docker rmi ${{ env.SERVICE_NAME }}:latest 2>/dev/null || true
              echo 'Admin@2025' | sudo -S docker build --no-cache -t ${{ env.SERVICE_NAME }}:latest .
              echo 'Admin@2025' | sudo -S docker tag ${{ env.SERVICE_NAME }}:latest ${{ env.SERVICE_NAME }}:\$(date +%Y%m%d-%H%M%S)
            "

      - name: Deploy container
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
              echo 'Admin@2025' | sudo -S docker stop ${{ env.SERVICE_NAME }} 2>/dev/null || true
              echo 'Admin@2025' | sudo -S docker rm -f ${{ env.SERVICE_NAME }} 2>/dev/null || true
              echo 'Admin@2025' | sudo -S docker run -d \
                --name ${{ env.SERVICE_NAME }} \
                --network backend_besew-network \
                -p ${{ env.CONTAINER_PORT }}:80 \
                --restart unless-stopped \
                ${{ env.SERVICE_NAME }}:latest
              sleep 8
              docker ps --filter name=${{ env.SERVICE_NAME }}
            "

      - name: Reload NGINX
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
              echo 'Admin@2025' | sudo -S nginx -t && echo 'Admin@2025' | sudo -S systemctl reload nginx || echo 'Admin@2025' | sudo -S systemctl restart nginx
            "

      - name: Verify deployment
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
              echo '=== Container Status ==='
              docker ps --filter name=${{ env.SERVICE_NAME }} --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

              echo ''
              echo '=== Health Check ==='
              sleep 10
              STATUS=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:${{ env.CONTAINER_PORT }} || echo 'FAILED')
              echo \"Admin Dashboard Health: \$STATUS\"
            "

      - name: Cleanup old images and backups
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
              docker images ${{ env.SERVICE_NAME }} --format '{{.ID}} {{.CreatedAt}}' | sort -rk 2 | tail -n +4 | awk '{print \$1}' | xargs -r docker rmi 2>/dev/null || true
              docker image prune -f
              cd ~ && ls -t admin-dashboard.backup.*.tar.gz 2>/dev/null | tail -n +4 | xargs -r rm -f
            "

      - name: Deployment summary
        if: always()
        run: | 
          echo "========================================="
          echo "ADMIN DASHBOARD PRODUCTION DEPLOYMENT"
          echo "========================================="
          echo "Service : ${{ env.SERVICE_NAME }}"
          echo "Domain  : https://${{ env.DOMAIN }}"
          echo "Port    : ${{ env.CONTAINER_PORT }}"
          echo "Status  : ${{ job.status }}"
          echo "========================================="
