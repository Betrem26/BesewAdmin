name: Deploy Admin Dashboard to Production

on:
  push:
    branches:
      - main
    paths:
      - 'apps/admin/bswadminfront/**'
      - '.github/workflows/sync-admin-production.yml'

env:
  JUMPHOST_IP: "197.156.110.145"
  JUMPHOST_PORT: "250"
  JUMPHOST_USER: "startupadmin"
  JUMPHOST_PASSWORD: "Admin@2025"
  DEPLOYMENT_PATH: "/mnt/data/besew/frontend/admin"
  SERVICE_NAME: "besew-admin-dashboard"
  CONTAINER_PORT: "3000"
  DOMAIN: "admin.besewonline.com"

jobs:
  approve-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Request approval for production deployment
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: brookgit
          issue-title: 'Approve production deployment for Admin Dashboard'
          issue-body: 'Please review and approve the production deployment for the admin dashboard'

  build-and-deploy:
    needs: approve-deployment
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create archive
        run: |
          cd apps/admin/bswadminfront
          tar --exclude='node_modules' --exclude='.git' --exclude='*.log' --exclude='dist' --exclude='.next' --exclude='out' --exclude='*.tar.gz' -czf ../../admin-dashboard-prod.tar.gz .
          ls -lh ../../admin-dashboard-prod.tar.gz

      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Transfer to jumphost
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" scp -P ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no admin-dashboard-prod.tar.gz ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }}:~/

      - name: Extract and setup on jumphost
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
            echo 'Setting up production admin dashboard on jumphost...'
            echo 'Admin@2025' | sudo -S mkdir -p ${{ env.DEPLOYMENT_PATH }}
            echo 'Admin@2025' | sudo -S chown startupadmin:startupadmin ${{ env.DEPLOYMENT_PATH }}
            if [ -d '${{ env.DEPLOYMENT_PATH }}' ] && [ -n \"\$(ls -A ${{ env.DEPLOYMENT_PATH }})\" ]; then
              tar -czf ~/admin-dashboard.backup.\$(date +%Y%m%d_%H%M%S).tar.gz -C ${{ env.DEPLOYMENT_PATH }} .
            fi
            rm -rf ${{ env.DEPLOYMENT_PATH }}/*
            cd ${{ env.DEPLOYMENT_PATH }}
            tar -xzf ~/admin-dashboard-prod.tar.gz
            rm ~/admin-dashboard-prod.tar.gz
          "

      - name: Build Docker image on jumphost
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
            cd ${{ env.DEPLOYMENT_PATH }}
            echo 'Admin@2025' | sudo -S rm -rf dist node_modules
            echo 'Admin@2025' | sudo -S docker builder prune -af
            docker rmi ${{ env.SERVICE_NAME }}:latest 2>/dev/null || true
            echo 'Admin@2025' | sudo -S docker build --no-cache -t ${{ env.SERVICE_NAME }}:latest .
            docker tag ${{ env.SERVICE_NAME }}:latest ${{ env.SERVICE_NAME }}:\$(date +%Y%m%d-%H%M%S)
          "

      - name: Deploy container
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
            echo 'Admin@2025' | sudo -S docker stop ${{ env.SERVICE_NAME }} 2>/dev/null || true
            echo 'Admin@2025' | sudo -S docker rm -f ${{ env.SERVICE_NAME }} 2>/dev/null || true
            echo 'Admin@2025' | sudo -S docker run -d \
              --name ${{ env.SERVICE_NAME }} \
              --network backend_besew-network \
              -p ${{ env.CONTAINER_PORT }}:80 \
              --restart unless-stopped \
              ${{ env.SERVICE_NAME }}:latest
            sleep 5
            docker ps --filter name=${{ env.SERVICE_NAME }}
          "

      - name: Reload NGINX
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
            echo 'Admin@2025' | sudo -S systemctl reload nginx
          "

      - name: Cleanup old images and backups
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
            docker images ${{ env.SERVICE_NAME }} --format '{{.ID}} {{.CreatedAt}}' | sort -rk 2 | tail -n +4 | awk '{print \$1}' | xargs -r docker rmi 2>/dev/null || true
            docker image prune -f
            cd ~ && ls -t admin-dashboard.backup.*.tar.gz 2>/dev/null | tail -n +4 | xargs -r rm -f
          "

      - name: Verify deployment
        run: |
          sleep 5
          curl -f https://${{ env.DOMAIN }}/ || exit 1
