name: Deploy Admin Dashboard to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  JUMPHOST_IP: "197.156.110.145"
  JUMPHOST_PORT: "250"
  JUMPHOST_USER: "startupadmin"
  JUMPHOST_PASSWORD: "Admin@2025"
  SERVICE_NAME: "besew-admin-dashboard"
  CONTAINER_PORT: "3000"
  DOMAIN: "admin.besewonline.com"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Run linting
      run: npm run lint || true
    
    - name: Build Vite application
      run: npm run build
    
    - name: Create deployment package
      run: |
        tar -czf bswadminfront-built.tar.gz dist/ Dockerfile nginx.conf
        ls -lh bswadminfront-built.tar.gz
    
    - name: Install SSH tools
      run: sudo apt-get update && sudo apt-get install -y sshpass
    
    - name: Transfer to jumphost
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" scp -P ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no bswadminfront-built.tar.gz ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }}:~/
    
    - name: Build Docker image on jumphost
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Building admin dashboard Docker image...'
          
          rm -rf ~/haye-admin-build
          mkdir -p ~/haye-admin-build
          cd ~/haye-admin-build
          
          tar -xzf ~/bswadminfront-built.tar.gz
          rm ~/bswadminfront-built.tar.gz
          
          docker build --no-cache -t ${{ env.SERVICE_NAME }}:latest .
          docker tag ${{ env.SERVICE_NAME }}:latest ${{ env.SERVICE_NAME }}:\$(date +%Y%m%d-%H%M%S)
          
          echo 'Docker image built successfully'
        "
    
    - name: Deploy container
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Deploying admin dashboard container...'
          
          docker stop ${{ env.SERVICE_NAME }} 2>/dev/null || true
          docker rm ${{ env.SERVICE_NAME }} 2>/dev/null || true
          
          docker run -d \
            --name ${{ env.SERVICE_NAME }} \
            --network backend_besew-network \
            -p ${{ env.CONTAINER_PORT }}:80 \
            --restart unless-stopped \
            ${{ env.SERVICE_NAME }}:latest
          
          echo 'Container started successfully'
        "
    
    - name: Wait for container to be ready
      run: sleep 10
    
    - name: Verify deployment
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Verifying deployment...'
          
          docker ps --filter name=${{ env.SERVICE_NAME }} --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          
          echo 'Container logs:'
          docker logs ${{ env.SERVICE_NAME }} --tail 20
          
          echo 'Testing local access...'
          HTTP_STATUS=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:${{ env.CONTAINER_PORT }})
          echo \"HTTP Status: \$HTTP_STATUS\"
          
          if [ \"\$HTTP_STATUS\" != \"200\" ]; then
            echo '[ERROR] Service not responding correctly'
            exit 1
          fi
          
          echo '[SUCCESS] Service is responding'
        "
    
    - name: Configure SSL certificate for admin domain
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Configuring SSL certificate for admin domain...'
          
          if echo '${{ env.JUMPHOST_PASSWORD }}' | sudo -S certbot certificates | grep -q '${{ env.DOMAIN }}'; then
            echo 'Admin domain already in certificate'
          else
            echo 'Expanding certificate to include admin domain...'
            echo '${{ env.JUMPHOST_PASSWORD }}' | sudo -S certbot --nginx \
              -d account.besewonline.com \
              -d besewonline.com \
              -d candidate.besewonline.com \
              -d commission.besewonline.com \
              -d jobs.besewonline.com \
              -d notify.besewonline.com \
              -d party.besewonline.com \
              -d psychometric.besewonline.com \
              -d www.besewonline.com \
              -d ${{ env.DOMAIN }} \
              --expand \
              --non-interactive \
              --agree-tos \
              --email admin@besewonline.com || echo '[WARNING] Certificate expansion failed'
          fi
        "
    
    - name: Configure NGINX for admin dashboard
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Configuring NGINX for admin dashboard...'
          
          cat > ~/admin-besewonline.conf << 'NGINX_EOF'
        server {
            listen 80;
            listen [::]:80;
            server_name ${{ env.DOMAIN }};
            return 301 https://\$host\$request_uri;
        }

        server {
            listen 443 ssl http2;
            listen [::]:443 ssl http2;
            server_name ${{ env.DOMAIN }};
            
            ssl_certificate /etc/letsencrypt/live/party.besewonline.com/fullchain.pem;
            ssl_certificate_key /etc/letsencrypt/live/party.besewonline.com/privkey.pem;
            ssl_trusted_certificate /etc/letsencrypt/live/party.besewonline.com/chain.pem;
            include /etc/letsencrypt/options-ssl-nginx.conf;
            ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
            
            add_header X-Frame-Options \"SAMEORIGIN\" always;
            add_header X-Content-Type-Options \"nosniff\" always;
            add_header X-XSS-Protection \"1; mode=block\" always;
            add_header Referrer-Policy \"strict-origin-when-cross-origin\" always;
            
            access_log /var/log/nginx/admin.access.log;
            error_log /var/log/nginx/admin.error.log;
            
            location / {
                proxy_pass http://127.0.0.1:${{ env.CONTAINER_PORT }};
                proxy_http_version 1.1;
                proxy_set_header Upgrade \$http_upgrade;
                proxy_set_header Connection \"upgrade\";
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_cache_bypass \$http_upgrade;
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }
            
            location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://127.0.0.1:${{ env.CONTAINER_PORT }};
                expires 1y;
                add_header Cache-Control \"public, immutable\";
            }
            
            location /health {
                proxy_pass http://127.0.0.1:${{ env.CONTAINER_PORT }}/health;
                access_log off;
            }
        }
        NGINX_EOF
          
          echo '${{ env.JUMPHOST_PASSWORD }}' | sudo -S mv ~/admin-besewonline.conf /etc/nginx/sites-available/
          echo '${{ env.JUMPHOST_PASSWORD }}' | sudo -S ln -sf /etc/nginx/sites-available/admin-besewonline.conf /etc/nginx/sites-enabled/
          
          echo '${{ env.JUMPHOST_PASSWORD }}' | sudo -S nginx -t
          echo '${{ env.JUMPHOST_PASSWORD }}' | sudo -S systemctl reload nginx
          
          echo 'NGINX configuration applied'
        "
    
    - name: Test production deployment
      run: |
        echo "Testing HTTP redirect..."
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.DOMAIN }})
        echo "HTTP Status: $HTTP_STATUS"
        
        echo "Testing HTTPS..."
        HTTPS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.DOMAIN }})
        echo "HTTPS Status: $HTTPS_STATUS"
        
        if [ "$HTTPS_STATUS" != "200" ]; then
          echo "[WARNING] HTTPS not returning 200 - may need SSL configuration"
        fi
    
    - name: Cleanup old Docker images
      run: |
        sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
          echo 'Cleaning up old Docker images...'
          
          docker images ${{ env.SERVICE_NAME }} --format '{{.ID}} {{.CreatedAt}}' | \
            sort -rk 2 | \
            tail -n +4 | \
            awk '{print \$1}' | \
            xargs -r docker rmi || true
          
          docker image prune -f
          
          echo 'Cleanup completed'
        "
    
    - name: Deployment summary
      if: always()
      run: |
        echo "========================================="
        echo "ADMIN DASHBOARD DEPLOYMENT SUMMARY"
        echo "========================================="
        echo "Service: Admin Dashboard (React + Vite)"
        echo "Domain: https://${{ env.DOMAIN }}"
        echo "Container: ${{ env.SERVICE_NAME }}"
        echo "Port: ${{ env.CONTAINER_PORT }}"
        echo "Status: ${{ job.status }}"
        echo "========================================="
