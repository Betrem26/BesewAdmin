name: Deploy Admin Dashboard to Staging

on:
  push:
    branches:
      - develop
    paths:
      - 'apps/admin/bswadminfront/**'
      - '.github/workflows/sync-admin-staging.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          cd apps/admin/bswadminfront
          docker build -t besew-admin-dashboard-staging:latest .

      - name: Save Docker image
        run: |
          docker save besew-admin-dashboard-staging:latest -o /tmp/admin-staging.tar

      - name: Transfer image to jumphost
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.JUMPHOST_IP }}
          port: ${{ secrets.JUMPHOST_PORT }}
          username: ${{ secrets.JUMPHOST_USER }}
          password: ${{ secrets.JUMPHOST_PASSWORD }}
          source: /tmp/admin-staging.tar
          target: /tmp/

      - name: Deploy to staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.JUMPHOST_IP }}
          port: ${{ secrets.JUMPHOST_PORT }}
          username: ${{ secrets.JUMPHOST_USER }}
          password: ${{ secrets.JUMPHOST_PASSWORD }}
          script: |
            # Load Docker image
            docker load -i /tmp/admin-staging.tar
            
            # Stop and remove old container if exists
            docker stop besew-admin-dashboard-staging 2>/dev/null || true
            docker rm besew-admin-dashboard-staging 2>/dev/null || true
            
            # Run new container
            docker run -d \
              --name besew-admin-dashboard-staging \
              -p 3003:80 \
              --restart unless-stopped \
              besew-admin-dashboard-staging:latest
            
            # Reload NGINX
            sudo systemctl reload nginx
            
            # Cleanup
            rm /tmp/admin-staging.tar

      - name: Verify deployment
        run: |
          sleep 5
          curl -f https://admin.stage.besewonline.com/ || exit 1
