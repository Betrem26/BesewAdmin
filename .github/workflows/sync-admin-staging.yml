name: Deploy Admin Dashboard to Staging

on:
  push:
    branches:
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  JUMPHOST_IP: "197.156.110.145"
  JUMPHOST_PORT: "250"
  JUMPHOST_USER: "startupadmin"
  JUMPHOST_PASSWORD: "Admin@2025"
  DEPLOYMENT_PATH: "/mnt/data/besew/frontend/admin-staging"
  SERVICE_NAME: "besew-admin-dashboard-staging"
  CONTAINER_PORT: "5134"
  DOMAIN: "admin.stage.besewonline.com"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --prefer-offline

      - name: Rebuild native modules
        run: |
          npm rebuild
          npm install @rollup/rollup-linux-x64-gnu --save-optional

      - name: Build React application (Vite)
        run: npm run build

      - name: Create deployment package
        run: |
          mkdir -p deployment-package
          cp -r dist deployment-package/
          cp Dockerfile deployment-package/
          cp nginx.conf deployment-package/ 2>/dev/null || true
          tar -czf /tmp/admin-dashboard-staging.tar.gz -C deployment-package .
          mv /tmp/admin-dashboard-staging.tar.gz ./admin-dashboard-staging.tar.gz
          ls -lh admin-dashboard-staging.tar.gz

      - name: Install SSH tools
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Transfer to jumphost
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" scp -P ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no \
            admin-dashboard-staging.tar.gz \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }}:/tmp/admin-dashboard-staging.tar.gz

      - name: Extract and setup on server
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
              echo 'Admin@2025' | sudo -S mkdir -p ${{ env.DEPLOYMENT_PATH }}
              echo 'Admin@2025' | sudo -S chown startupadmin:startupadmin ${{ env.DEPLOYMENT_PATH }}
              rm -rf ${{ env.DEPLOYMENT_PATH }}/*
              cd ${{ env.DEPLOYMENT_PATH }}
              tar -xzf /tmp/admin-dashboard-staging.tar.gz
              rm /tmp/admin-dashboard-staging.tar.gz
            "

      - name: Build Docker image
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
              cd ${{ env.DEPLOYMENT_PATH }}
              echo 'Admin@2025' | sudo -S docker builder prune -af
              echo 'Admin@2025' | sudo -S docker rmi ${{ env.SERVICE_NAME }}:latest 2>/dev/null || true
              echo 'Admin@2025' | sudo -S docker build --no-cache -t ${{ env.SERVICE_NAME }}:latest .
            "

      - name: Deploy container
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
              echo 'Admin@2025' | sudo -S docker stop ${{ env.SERVICE_NAME }} 2>/dev/null || true
              echo 'Admin@2025' | sudo -S docker rm -f ${{ env.SERVICE_NAME }} 2>/dev/null || true
              echo 'Admin@2025' | sudo -S docker run -d \
                --name ${{ env.SERVICE_NAME }} \
                --network backend_besew-network \
                -p 127.0.0.1:${{ env.CONTAINER_PORT }}:80 \
                --restart unless-stopped \
                ${{ env.SERVICE_NAME }}:latest
              sleep 8
              echo 'Admin@2025' | sudo -S docker ps --filter name=${{ env.SERVICE_NAME }}
            "

      - name: Reload NGINX
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
              echo 'Admin@2025' | sudo -S systemctl reload nginx
            "

      - name: Verify deployment
        run: |
          sshpass -p "${{ env.JUMPHOST_PASSWORD }}" ssh -p ${{ env.JUMPHOST_PORT }} -o StrictHostKeyChecking=no \
            ${{ env.JUMPHOST_USER }}@${{ env.JUMPHOST_IP }} "
              echo 'Checking container status...'
              docker ps --filter name=${{ env.SERVICE_NAME }} --filter status=running
              RUNNING=\$(docker ps --filter name=${{ env.SERVICE_NAME }} --filter status=running -q)
              if [ -z \"\$RUNNING\" ]; then
                echo 'ERROR: Container is not running!'
                docker logs ${{ env.SERVICE_NAME }} --tail=20
                exit 1
              fi
              echo 'SUCCESS: Container is running.'
              curl -sf http://localhost:${{ env.CONTAINER_PORT }}/ -o /dev/null && echo 'HTTP check: OK' || echo 'HTTP check: No response (may still be starting)'
            "

      - name: Deployment summary
        if: always()
        run: |
          echo "========================================="
          echo "ADMIN DASHBOARD STAGING DEPLOYMENT"
          echo "========================================="
          echo "Service : ${{ env.SERVICE_NAME }}"
          echo "Domain  : https://${{ env.DOMAIN }}"
          echo "Port    : ${{ env.CONTAINER_PORT }}"
          echo "Status  : ${{ job.status }}"
          echo "========================================="
